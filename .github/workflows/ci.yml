name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test:
    uses: lvlup-sw/.github/.github/workflows/build-and-test.yml@main
    with:
      solution-path: 'src/strategos.sln'
      test-project-patterns: |
        src/*Tests/*.csproj
      skip-patterns: |
        *Benchmarks.Tests*
      runner: 'blacksmith-4vcpu-ubuntu-2204'
      dotnet-version: '10.0.x'
      dotnet-quality: 'preview'

  pack-verify:
    name: Pack (verify)
    needs: build-test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Pack
        run: dotnet pack src/strategos.sln --configuration Release --output ./packages

      - name: Consumer dep-flow probe (G1 / F1 regression net)
        # Verifies that a clean consumer referencing only the packed
        # LevelUp.Strategos + LevelUp.Strategos.Generators nupkgs can resolve
        # IPhaseAwareSaga at compile time. This guards against a regression of
        # the v2.7.0-preview.1 G1 packaging bug where PrivateAssets="all" on
        # the Generators -> Identity.Abstractions ProjectReference (combined
        # with <DevelopmentDependency>true</DevelopmentDependency>) stripped
        # the abstractions package from the consumer's compile classpath.
        run: bash scripts/verify-generator-consumer-build.sh ./packages

  basileus-smoke:
    # DR-11 / T-022 release-readiness gate.
    #
    # Packs LevelUp.Strategos.Agents at the pinned v2.7.0-preview.2
    # version into a directory-based local feed, then restores + builds
    # + runs the smoke project at tests/basileus-smoke/. The smoke
    # project's BasileusConsumedSurfaceTests asserts (a) the basileus-
    # consumed public surface (IConversationThreadManager,
    # IWorkflowAgentFactory, IStreamingHandler) still compiles against
    # a mock implementation and (b) the post-DR-11 deletion of the
    # single-arity IAgentStep<>/AgentStepBase<> types is reflected in
    # the packed artifact (not just the in-repo build).
    name: Basileus smoke (release-readiness)
    needs: build-test
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Pack Strategos.Agents to local feed
        run: bash scripts/pack-to-local-feed.sh ./local-feed

      - name: Restore + build + test smoke project
        run: |
          dotnet restore tests/basileus-smoke/Basileus.Smoke.Tests/Basileus.Smoke.Tests.csproj
          dotnet test tests/basileus-smoke/Basileus.Smoke.Tests/Basileus.Smoke.Tests.csproj -c Release --no-restore

  coverage-gate:
    needs: build-test
    if: github.event_name == 'pull_request'
    uses: lvlup-sw/.github/.github/workflows/coverage-gate.yml@main
    permissions:
      pull-requests: write
    with:
      coverage-threshold: 80

  update-baseline:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: lvlup-sw/.github/.github/workflows/update-baseline.yml@main

  dbsf-parity-guard:
    # Verifies src/Strategos.Ontology.Tests/Retrieval/Fixtures/qdrant-dbsf-oracle.json
    # still matches the output of qdrant_client.hybrid.fusion.distribution_based_score_fusion
    # for the pinned qdrant-client version. Reconciliation issue #79; see
    # docs/plans/2026-05-16-refactor-dbsf-qdrant-parity.md.
    name: DBSF parity guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install qdrant-client (pinned)
        run: python3 -m pip install -r scripts/requirements.txt

      - name: Verify DBSF oracle matches real qdrant
        run: python3 scripts/regenerate-dbsf-oracle.py --check
