name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test:
    uses: lvlup-sw/.github/.github/workflows/build-and-test.yml@main
    with:
      solution-path: 'src/strategos.sln'
      test-project-patterns: |
        src/*Tests/*.csproj
      skip-patterns: |
        *Benchmarks.Tests*
        *Contracts.Tests*
      runner: 'blacksmith-4vcpu-ubuntu-2204'
      dotnet-version: '10.0.x'
      dotnet-quality: 'preview'

  contracts-test:
    # Strategos.Contracts.Tests drives the TypeSpec Node toolchain (npx tsp
    # compile) to assert emitted schema shape. The shared build-and-test
    # reusable workflow provisions only .NET, so these tests are skipped there
    # (skip-patterns above) and run here in a Node-provisioned job — co-locating
    # the test project with the toolchain it depends on. @typespec/compiler 1.11
    # requires Node 22+ (it imports `glob` from `fs/promises`), matching the
    # Node 24 the codegen guard already pins.
    name: Contracts tests (Node toolchain)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore TypeSpec toolchain
        working-directory: src/Strategos.Contracts
        run: npm ci || npm install --no-audit --no-fund

      - name: Run Contracts tests
        # TUnit uses the Microsoft.Testing.Platform exe entrypoint (the project
        # sets OutputType=Exe); invoke via `dotnet run`, mirroring basileus-smoke.
        run: dotnet run --project src/Strategos.Contracts.Tests/Strategos.Contracts.Tests.csproj --configuration Release

  pack-verify:
    name: Pack (verify)
    needs: build-test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Pack
        run: dotnet pack src/strategos.sln --configuration Release --output ./packages

      - name: Consumer dep-flow probe (G1 / F1 regression net)
        # Verifies that a clean consumer referencing only the packed
        # LevelUp.Strategos + LevelUp.Strategos.Generators nupkgs can resolve
        # IPhaseAwareSaga at compile time. This guards against a regression of
        # the v2.7.0-preview.1 G1 packaging bug where PrivateAssets="all" on
        # the Generators -> Identity.Abstractions ProjectReference (combined
        # with <DevelopmentDependency>true</DevelopmentDependency>) stripped
        # the abstractions package from the consumer's compile classpath.
        run: bash scripts/verify-generator-consumer-build.sh ./packages

  basileus-smoke:
    # DR-11 / T-022 release-readiness gate.
    #
    # Packs LevelUp.Strategos.Agents at a synthetic 2.7.0-smoke version
    # version into a directory-based local feed, then restores + builds
    # + runs the smoke project at tests/basileus-smoke/. The smoke
    # project's BasileusConsumedSurfaceTests asserts (a) the basileus-
    # consumed public surface (IConversationThreadManager,
    # IWorkflowAgentFactory, IStreamingHandler) still compiles against
    # a mock implementation and (b) the post-DR-11 deletion of the
    # single-arity IAgentStep<>/AgentStepBase<> types is reflected in
    # the packed artifact (not just the in-repo build).
    name: Basileus smoke (release-readiness)
    needs: build-test
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Pack Strategos.Agents to local feed
        run: bash scripts/pack-to-local-feed.sh ./local-feed

      - name: Restore + build + test smoke project
        # TUnit uses the Microsoft.Testing.Platform exe entrypoint, not the
        # vstest host — invoke via `dotnet run` (the project sets
        # OutputType=Exe). `dotnet test` was rejected by the .NET 10 SDK
        # ("Specifying a project for 'dotnet test' should be via '--project'")
        # AND would not surface TUnit's source-generated test list anyway.
        run: |
          dotnet restore tests/basileus-smoke/Basileus.Smoke.Tests/Basileus.Smoke.Tests.csproj
          dotnet run --project tests/basileus-smoke/Basileus.Smoke.Tests/Basileus.Smoke.Tests.csproj --configuration Release --no-restore

  coverage-gate:
    needs: build-test
    if: github.event_name == 'pull_request'
    uses: lvlup-sw/.github/.github/workflows/coverage-gate.yml@main
    permissions:
      pull-requests: write
    with:
      coverage-threshold: 80

  update-baseline:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: lvlup-sw/.github/.github/workflows/update-baseline.yml@main

  quality-gates:
    # T-023 / DR-7, DR-10, DR-11 grep gates. Pure shell — no .NET needed,
    # runs as a parallel job (NOT `needs: build-test`) so the slowest gate
    # doesn't block the others.
    name: Quality gates (grep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AGAG hygiene (DR-7)
        run: bash scripts/check-agag-hygiene.sh

      - name: Catch discipline (DR-10)
        run: bash scripts/check-catch-discipline.sh

      - name: Prose discipline (DIM-8)
        run: bash scripts/check-prose.sh

  dbsf-parity-guard:
    # Verifies src/Strategos.Ontology.Tests/Retrieval/Fixtures/qdrant-dbsf-oracle.json
    # still matches the output of qdrant_client.hybrid.fusion.distribution_based_score_fusion
    # for the pinned qdrant-client version. Reconciliation issue #79; see
    # docs/plans/2026-05-16-refactor-dbsf-qdrant-parity.md.
    name: DBSF parity guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install qdrant-client (pinned)
        run: python3 -m pip install -r scripts/requirements.txt

      - name: Verify DBSF oracle matches real qdrant
        run: python3 scripts/regenerate-dbsf-oracle.py --check
